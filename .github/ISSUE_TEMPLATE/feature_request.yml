name: Feature request
description: Suggest an improvement for the BYD vehicle integration.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        API mapping collaboration is coordinated in pyBYD issue #20: https://github.com/jkaberg/pyBYD/issues/20
        If this request is API mapping related (new/unknown fields, endpoint mapping, payload semantics), please coordinate in that issue.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem are you trying to solve?
      placeholder: Clear and concise problem description.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be added or changed?
      placeholder: Describe the proposed behavior.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: User impact
      description: Why this matters and who benefits.
      placeholder: Expected benefit for users.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: |
        Optional logs, screenshots, or references.
        If this request relates to missing/unknown BYD fields, include redacted output from the raw fetch services documented here:
        https://github.com/jkaberg/hass-byd-vehicle/blob/main/docs/TROUBLESHOOTING.md#raw-api-fetch-services
