name: Bug report
description: File a bug report.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        IMPORTANT: Before filing a bug report, please make sure you have verified your observed bug report with how the BYD mobile app works. 
        The integration shares the same API as the app, so if the app doesn't work as expected, the integration won't either. If you can reproduce the issue in the app, please report it to BYD support.

        API mapping collaboration is coordinated in pyBYD issue #20: https://github.com/jkaberg/pyBYD/issues/20
        If your bug is about API mapping/new fields/payload interpretation, please coordinate there as well.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you see.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Trigger ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: home-assistant-version
    attributes:
      label: Home Assistant version
      placeholder: 2026.x.x
    validations:
      required: true

  - type: input
    id: integration-version
    attributes:
      label: Integration version
      placeholder: Version from HACS or manifest
    validations:
      required: true

  - type: input
    id: region
    attributes:
      label: BYD app region and country
      placeholder: "Example: EU / Sweden"
    validations:
      required: true

  - type: textarea
    id: relevant-log-output
    attributes:
      label: Relevant log output
      description: |
        Please paste relevant **debug** logs. Redact VIN, tokens, email, and account identifiers.
        To enable debug logging, see [Debug logging instructions](https://github.com/jkaberg/hass-byd-vehicle/blob/main/docs/TROUBLESHOOTING.md#enable-debug-logging).
        For data/parsing issues, also run the raw fetch service calls and include the matching log lines (redacted): [Raw API fetch services](https://github.com/jkaberg/hass-byd-vehicle/blob/main/docs/TROUBLESHOOTING.md#raw-api-fetch-services).

        ⚠️ Issues without valid debug logs will be automatically closed.
      placeholder: |
        2026-03-02 12:00:00.123 DEBUG (MainThread) [custom_components.byd_vehicle] ...
      render: shell
    validations:
      required: true